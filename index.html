<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renungan PSM - Pagi Siang Malam</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary-gold: #D4AF37; --dark-gold: #B8860B; --light-gold: #F4E8C1; --deep-navy: #1a1a2e; --soft-white: #fafafa; --text-dark: #2c2c2c; --text-light: #666; }
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; color: var(--text-dark); line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, var(--deep-navy) 0%, #16213e 100%); color: white; border-radius: 20px; margin-bottom: 30px; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5em; font-weight: 600; margin-bottom: 10px; letter-spacing: 2px; color: var(--primary-gold); }
        .subtitle { font-size: 0.9em; opacity: 0.9; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
        .date-display { font-size: 1.1em; font-weight: 300; background: rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 30px; display: inline-block; border: 1px solid rgba(212,175,55,0.3); }
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab { background: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: 0.95em; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tab.active { background: var(--deep-navy); color: var(--primary-gold); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(26,26,46,0.3); }
        .tab-icon { margin-right: 8px; font-size: 1.2em; }
        .content-card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); margin-bottom: 20px; position: relative; overflow: hidden; min-height: 400px; }
        .content-card::before { content: ''; position: absolute; top: 0; left: 0; width: 5px; height: 100%; background: linear-gradient(to bottom, var(--primary-gold), var(--dark-gold)); }
        .session-header { display: flex; align-items: center; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 2px solid var(--light-gold); }
        .session-icon { font-size: 2.5em; margin-right: 20px; background: linear-gradient(135deg, var(--primary-gold), var(--dark-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .session-title-group h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8em; color: var(--deep-navy); margin-bottom: 5px; }
        .theme-badge { display: inline-block; background: var(--light-gold); color: var(--dark-gold); padding: 5px 15px; border-radius: 20px; font-size: 0.85em; font-weight: 600; margin-bottom: 15px; }
        .scripture-box { background: linear-gradient(135deg, var(--light-gold) 0%, #fff9e6 100%); padding: 25px; border-radius: 15px; margin-bottom: 25px; border-left: 4px solid var(--primary-gold); }
        .scripture-ref { font-family: 'Cormorant Garamond', serif; font-size: 1.5em; font-weight: 600; color: var(--dark-gold); display: block; text-align: center; }
        .scripture-note { font-size: 0.9em; color: var(--text-light); margin-top: 10px; text-align: center; font-style: italic; }
        .devotion-content { color: var(--text-dark); line-height: 1.9; font-size: 1.05em; text-align: justify; }
        .devotion-content p { margin-bottom: 15px; }
        .reflection-question { background: var(--soft-white); padding: 20px; border-radius: 12px; margin-top: 25px; border: 1px solid #e0e0e0; }
        .prayer-section { margin-top: 30px; padding: 25px; background: linear-gradient(135deg, var(--deep-navy) 0%, #16213e 100%); color: white; border-radius: 15px; position: relative; overflow: hidden; }
        .prayer-section::before { content: '"'; position: absolute; top: -20px; right: 20px; font-size: 120px; opacity: 0.1; font-family: 'Cormorant Garamond', serif; }
        .prayer-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4em; color: var(--primary-gold); margin-bottom: 15px; }
        .prayer-text { font-style: italic; line-height: 1.8; }
        footer { text-align: center; padding: 30px; color: var(--text-light); font-size: 0.9em; margin-top: 40px; }
        .footer-divider { width: 50px; height: 2px; background: var(--primary-gold); margin: 0 auto 15px; }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { h1 { font-size: 2em; } .content-card { padding: 25px; } .tabs { gap: 10px; } .tab { padding: 12px 20px; font-size: 0.85em; } }
        .bible-link {
    color: var(--dark-gold);
    text-decoration: none;
    font-weight: 600;
    border-bottom: 1px dashed var(--primary-gold);
    transition: all 0.3s ease;
}
.bible-link:hover {
    color: var(--primary-gold);
    border-bottom: 1px solid var(--primary-gold);
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Renungan PSM</h1>
            <div class="subtitle">Pagi Siang Malam</div>
            <div class="date-display" id="currentDate"></div>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('pagi')" id="tab-pagi"><span class="tab-icon">🌅</span>Pagi</button>
            <button class="tab" onclick="switchTab('siang')" id="tab-siang"><span class="tab-icon">☀️</span>Siang</button>
            <button class="tab" onclick="switchTab('malam')" id="tab-malam"><span class="tab-icon">🌙</span>Malam</button>
        </div>

        <div id="contentArea">
            <div class="content-card fade-in" id="pagi-content">
                <div class="session-header">
                    <div class="session-icon">🌅</div>
                    <div class="session-title-group"><h2>Renungan Pagi</h2><div class="theme-badge" id="pagi-theme"></div></div>
                </div>
                <div class="scripture-box">
                    <span class="scripture-ref" id="pagi-ref"></span>
                    <div class="scripture-note"><a href="#" class="bible-link" data-session="pagi">Bacalah ayat ini di sini</a></div>
                </div>
                <div class="devotion-content" id="pagi-devotion"></div>
                <div class="reflection-question"><h4>💭 Renungkan:</h4><p id="pagi-question"></p></div>
                <div class="prayer-section"><div class="prayer-title">Doa Pagi</div><div class="prayer-text" id="pagi-prayer"></div></div>
            </div>

            <div class="content-card hidden" id="siang-content">
                <div class="session-header">
                    <div class="session-icon">☀️</div>
                    <div class="session-title-group"><h2>Renungan Siang</h2><div class="theme-badge" id="siang-theme"></div></div>
                </div>
                <div class="scripture-box">
                    <span class="scripture-ref" id="siang-ref"></span>
                    <div class="scripture-note"><a href="#" class="bible-link" data-session="siang">Bacalah ayat ini di sini</a></div>
                </div>
                <div class="devotion-content" id="siang-devotion"></div>
                <div class="reflection-question"><h4>💭 Renungkan:</h4><p id="siang-question"></p></div>
                <div class="prayer-section"><div class="prayer-title">Doa Siang</div><div class="prayer-text" id="siang-prayer"></div></div>
            </div>

            <div class="content-card hidden" id="malam-content">
                <div class="session-header">
                    <div class="session-icon">🌙</div>
                    <div class="session-title-group"><h2>Renungan Malam</h2><div class="theme-badge" id="malam-theme"></div></div>
                </div>
                <div class="scripture-box">
                    <span class="scripture-ref" id="malam-ref"></span>
                    <div class="scripture-note"><a href="#" class="bible-link" data-session="malam">Bacalah ayat ini di sini</a></div>
                </div>
                <div class="devotion-content" id="malam-devotion"></div>
                <div class="reflection-question"><h4>💭 Renungkan:</h4><p id="malam-question"></p></div>
                <div class="prayer-section"><div class="prayer-title">Doa Malam</div><div class="prayer-text" id="malam-prayer"></div></div>
            </div>
        </div>

        <footer>
            <div class="footer-divider"></div>
            <p>&copy; 2026 by Ps. Yanto Goutama</p>
            <p style="margin-top: 5px; font-size: 0.85em;">Renungan PSM - Pagi Siang Malam</p>
        </footer>
    </div>

    <script>
        // Database kitab dengan tema dan jumlah pasal
        const bibleBooks = [
            { name: "Mazmur", chapters: 150, theme: "Pujian dan Doa" },
            { name: "Amsal", chapters: 31, theme: "Hikmat dan Kebijaksanaan" },
            { name: "Yesaya", chapters: 66, theme: "Pengharapan dan Keselamatan" },
            { name: "Yeremia", chapters: 52, theme: "Pemulihan dan Pengampunan" },
            { name: "Ratapan", chapters: 5, theme: "Kesedihan dan Penghiburan" },
            { name: "Yehezkiel", chapters: 48, theme: "Kebangkitan dan Pembaruan" },
            { name: "Daniel", chapters: 12, theme: "Kesetiaan dan Kemenangan" },
            { name: "Hosea", chapters: 14, theme: "Kasih Setia Allah" },
            { name: "Yoel", chapters: 3, theme: "Pertobatan dan Pemulihan" },
            { name: "Amos", chapters: 9, theme: "Keadilan dan Kebenaran" },
            { name: "Obaja", chapters: 1, theme: "Kebangkitan Israel" },
            { name: "Yunus", chapters: 4, theme: "Kasih Karunia bagi Semua" },
            { name: "Mikha", chapters: 7, theme: "Keadilan dan Kemurahan" },
            { name: "Nahum", chapters: 3, theme: "Penghakiman dan Pembebasan" },
            { name: "Habakuk", chapters: 3, theme: "Iman di Tengah Kekacauan" },
            { name: "Zefanya", chapters: 3, theme: "Sukacita dalam Keselamatan" },
            { name: "Hagai", chapters: 2, theme: "Prioritas dan Pengabdian" },
            { name: "Zakharia", chapters: 14, theme: "Kedatangan dan Kemuliaan" },
            { name: "Maleakhi", chapters: 4, theme: "Kesetiaan dalam Perjanjian" },
            { name: "Matius", chapters: 28, theme: "Kerajaan Surga" },
            { name: "Markus", chapters: 16, theme: "Pelayanan dan Pengorbanan" },
            { name: "Lukas", chapters: 24, theme: "Kasih Karunia bagi Semua" },
            { name: "Yohanes", chapters: 21, theme: "Kehidupan Kekal" },
            { name: "Kisah Para Rasul", chapters: 28, theme: "Pemberitaan Injil" },
            { name: "Roma", chapters: 16, theme: "Pembenaran oleh Iman" },
            { name: "1 Korintus", chapters: 16, theme: "Kesatuan dan Kasih" },
            { name: "2 Korintus", chapters: 13, theme: "Penghiburan dan Pemulihan" },
            { name: "Galatia", chapters: 6, theme: "Kemerdekaan di Kristus" },
            { name: "Efesus", chapters: 6, theme: "Pertumbuhan dan Perlengkapan" },
            { name: "Filipi", chapters: 4, theme: "Sukacita dan Kecukupan" },
            { name: "Kolose", chapters: 4, theme: "Kemuliaan Kristus" },
            { name: "1 Tesalonika", chapters: 5, theme: "Kedatangan Kedua" },
            { name: "2 Tesalonika", chapters: 3, theme: "Kesabaran dan Kerja" },
            { name: "1 Timotius", chapters: 6, theme: "Pengajaran dan Disiplin" },
            { name: "2 Timotius", chapters: 4, theme: "Kesetiaan dan Penderitaan" },
            { name: "Titus", chapters: 3, theme: "Pengajaran yang Sehat" },
            { name: "Filemon", chapters: 1, theme: "Pengampunan dan Reconciliation" },
            { name: "Ibrani", chapters: 13, theme: "Iman yang Teguh" },
            { name: "Yakobus", chapters: 5, theme: "Iman dan Perbuatan" },
            { name: "1 Petrus", chapters: 5, theme: "Pengharapan dalam Penderitaan" },
            { name: "2 Petrus", chapters: 3, theme: "Pertumbuhan dalam Kasih" },
            { name: "1 Yohanes", chapters: 5, theme: "Kasih dan Kepastian" },
            { name: "2 Yohanes", chapters: 1, theme: "Kasih dalam Kebenaran" },
            { name: "3 Yohanes", chapters: 1, theme: "Kesucian dan Kerendahan Hati" },
            { name: "Yudas", chapters: 1, theme: "Iman yang Diperjuangkan" },
            { name: "Wahyu", chapters: 22, theme: "Kemenangan dan Kekekalan" },
            { name: "Kejadian", chapters: 50, theme: "Penciptaan dan Pemeliharaan" },
            { name: "Keluaran", chapters: 40, theme: "Pembebasan dan Keselamatan" },
            { name: "Imamat", chapters: 27, theme: "Kekudusan dan Pengudusan" },
            { name: "Bilangan", chapters: 36, theme: "Kesetiaan dan Perjalanan" },
            { name: "Ulangan", chapters: 34, theme: "Peringatan dan Perjanjian" },
            { name: "Yosua", chapters: 24, theme: "Kemenangan dan Ketaatan" },
            { name: "Hakim-hakim", chapters: 21, theme: "Pembebasan dan Kejatohan" },
            { name: "Rut", chapters: 4, theme: "Kasih Setia dan Pemeliharaan" },
            { name: "1 Samuel", chapters: 31, theme: "Kerajaan dan Kepemimpinan" },
            { name: "2 Samuel", chapters: 24, theme: "Kerajaan dan Penebusan" },
            { name: "1 Raja-raja", chapters: 22, theme: "Kebijaksanaan dan Kegagalan" },
            { name: "2 Raja-raja", chapters: 25, theme: "Kesetiaan dan Kehancuran" },
            { name: "1 Tawarikh", chapters: 29, theme: "Sejarah dan Pewarisan" },
            { name: "2 Tawarikh", chapters: 36, theme: "Kebangunan dan Pemulihan" },
            { name: "Ezra", chapters: 10, theme: "Pemulihan dan Pembangunan" },
            { name: "Nehemia", chapters: 13, theme: "Kesatuan dan Pengabdian" },
            { name: "Ester", chapters: 10, theme: "Pemeliharaan Ilahi" },
            { name: "Ayub", chapters: 42, theme: "Penderitaan dan Pemulihan" }
        ];

        // Hitung hari ke-berapa dalam tahun
        function getDayOfYear() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            return Math.floor(diff / (1000 * 60 * 60 * 24));
        }
    
        // Generate data untuk satu sesi (pagi/siang/malam)
        function getSessionData(session, dayOfYear) {
    // TAMBAHAN: Variasi tahunan agar renungan beda tiap tahun
    const year = new Date().getFullYear();
    const yearOffset = (year - 2026) * 100;
    const uniqueDay = dayOfYear + yearOffset;
    
    // Offset berbeda untuk setiap sesi agar ayat berbeda
    const offset = session === 'pagi' ? 0 : session === 'siang' ? 1 : 2;
    const bookIndex = (uniqueDay + offset) % bibleBooks.length;  // DIUBAH: pakai uniqueDay
    const book = bibleBooks[bookIndex];
    
    // Generate chapter yang valid
    const chapter = ((dayOfYear * 3 + offset * 7) % book.chapters) + 1;
    
    // Generate verse (1-30)
    const verse = ((dayOfYear * 7 + offset * 13) % 30) + 1;
    
    // Tema berdasarkan kitab dan hari
    const dailyTheme = `${book.theme} - Hari ke-${dayOfYear}`;
    
    // Renungan yang terhubung dengan tema kitab
    const timeContext = session === 'pagi' ? 'Pagi' : session === 'siang' ? 'Siang' : 'Malam';
    const activity = session === 'pagi' ? 'memulai hari' : session === 'siang' ? 'meneruskan pekerjaan' : 'mengakhiri hari';
    
    const devotion = {
    intro: `${timeContext} ini kita akan merenungkan tema "${book.theme}" dari kitab ${book.name}. Saat kita ${activity}, firman Tuhan menuntun langkah kita.`,
    body: `Kitab ${book.name} kaya akan pengajaran tentang ${book.theme.toLowerCase()}. Mari kita renungkan ayat ${chapter}:${verse} dan biarkan Roh Kudus berbicara melalui firman-Nya. Bacalah ayat tersebut dengan sungguh-sungguh dalam Alkitab Anda, carilah hikmat yang dapat menjadi pedoman hidup Anda ${session === 'pagi' ? 'sepanjang hari ini' : session === 'siang' ? 'di tengah aktivitas Anda' : 'sebelum Anda beristirahat'}.`,
    reflection: `Setelah membaca ${book.name} ${chapter}:${verse}, renungkan: Apakah ada pesan khusus yang Tuhan sampaikan untuk kehidupan Anda saat ini?`,
    prayer: `Bapa di sorga, terbukalah hati kami untuk menerima firman-Mu dari ${book.name}. Ajar kami memahami dan menghidupi kebenaran-Mu dalam setiap langkah. Dalam nama Yesus, kami berdoa. Amin.`
};
    
    return {
        ref: `${book.name} ${chapter}:${verse}`,
        theme: dailyTheme,
        devotion: devotion
    };
}
        // Load konten
        function loadContent() {
            const dayOfYear = getDayOfYear();
            
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('id-ID', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });

            ['pagi', 'siang', 'malam'].forEach(session => {
                const data = getSessionData(session, dayOfYear);
                
                document.getElementById(`${session}-theme`).textContent = data.theme;
                document.getElementById(`${session}-ref`).textContent = data.ref;
                document.getElementById(`${session}-devotion`).innerHTML = `<p>${data.devotion.intro}</p><p>${data.devotion.body}</p>`;
                document.getElementById(`${session}-question`).textContent = data.devotion.reflection;
                document.getElementById(`${session}-prayer`).textContent = data.devotion.prayer;
            });

            setActiveTabByTime();
        }

        // Switch tab
        function switchTab(session) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab-${session}`).classList.add('active');
            document.querySelectorAll('.content-card').forEach(card => {
                card.classList.add('hidden');
                card.classList.remove('fade-in');
            });
            const activeCard = document.getElementById(`${session}-content`);
            activeCard.classList.remove('hidden');
            activeCard.classList.add('fade-in');
        }

        // Auto-detect waktu
        function setActiveTabByTime() {
            const hour = new Date().getHours();
            let session = 'pagi';
            if (hour >= 12 && hour < 18) session = 'siang';
            else if (hour >= 18 || hour < 6) session = 'malam';
            switchTab(session);
        }

        document.addEventListener('DOMContentLoaded', loadContent);
        // Setup Bible links
function setupBibleLinks() {
    document.querySelectorAll('.bible-link').forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            const session = this.getAttribute('data-session');
            const ref = document.getElementById(`${session}-ref`).textContent;
            
            // Parse reference (e.g., "Amos 3:14")
            const parts = ref.split(' ');
            const book = parts.slice(0, -1).join(' '); // Handle multi-word books
            const chapterVerse = parts[parts.length - 1];
            const [chapter, verse] = chapterVerse.split(':');
            
            // Create URL for Alkitab.me (LAI Online)
            // Format: https://alkitab.me/browse/Amos/3/14
            const encodedBook = encodeURIComponent(book);
            const url = `https://alkitab.mobi/tb/${encodedBook}/${chapter}/${verse}`;
            
            window.open(url, '_blank');
        });
    });
}

// Panggil di dalam loadContent()
// Cari baris: document.addEventListener('DOMContentLoaded', loadContent);
// Ubah menjadi:
document.addEventListener('DOMContentLoaded', function() {
    loadContent();
    setupBibleLinks();
});
    </script>
</body>
</html>
